            <nav class="mt-2">
                <ul class="nav nav-pills nav-sidebar flex-column" data-widget="treeview" data-accordion="false">

                        <a href="#/" class="nav-link spa-link">

                        </a>
                    </li>
                    <li class="nav-item has-treeview">
                        <a href="#" class="nav-link">

                            <p>Clientes<i class="fas fa-angle-left right"></i></p>
                        </a>
                        <ul class="nav nav-treeview">
                            <li class="nav-item">
                                <a href="#/clientes" class="nav-link spa-link">
                                    <i class="far fa-circle nav-icon"></i><p>Lista Clientes</p>
                                </a>
                            </li>

                                <a href="#/clientes/nuevo" class="nav-link spa-link">

                        <a href="#" class="nav-link">

                            <p>Facturación<i class="fas fa-angle-left right"></i></p>
                        </a>
                        <ul class="nav nav-treeview">
                            <li class="nav-item">
                                <a href="#/facturas" class="nav-link spa-link">
                                    <i class="far fa-circle nav-icon"></i><p>Facturas Pendientes</p>
                                </a>
                            </li>
                            <li class="nav-item">
                                <a href="#/pagos" class="nav-link spa-link">
                                    <i class="far fa-circle nav-icon"></i><p>Pagos</p>
                                </a>
                            </li>
                        </ul>
                    </li>

                                </a>
                            </li>
                        </ul>
                    </li>
                </ul>
            </nav>
        </div>
    </aside>

    <!-- Content Wrapper -->
    <div class="content-wrapper">
        <div id="app">
            <div class="loading"><i class="fas fa-spinner fa-spin fa-2x"></i><p>Cargando...</p></div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="main-footer">

<!-- Scripts -->
<script src="/plugins/jquery/jquery.min.js"></script>

<script src="/js/api.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/pages/home.js"></script>
<script src="/js/pages/clientes.js"></script>
<script src="/js/pages/facturas.js"></script>
<script src="/js/pages/pagos.js"></script>
<script src="/js/pages/planes.js"></script>
<script src="/js/router.js"></script>
<script>
    window.currentUser = {};
    API.get('/me').then(u => {
        if (u) {
            window.currentUser = u;
            document.getElementById('user-display').textContent = u.username;
        }
    });
    // Register Service Worker
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').then(r => console.log('SW registered')).catch(e => console.warn('SW failed', e));
    }
</script>

</html>
